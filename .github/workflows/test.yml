name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'ramanujan_breakthrough_generator.py'
      - 'research_integration.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (editable)
        run: pip install -e ".[dev]"

      - name: CLI help check
        run: ramanujan-discover --help

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Smoke test — 5-cycle discovery
        run: python ramanujan_breakthrough_generator.py --cycles 5 --seed 42

      - name: Integration import check
        run: |
          python -c "
          from research_integration import (
              ContextualBreakthroughGenerator, discover, TOOL_SCHEMA,
              tool_call_handler, DiscoveryResult,
              gpt_researcher_adapter, rd_agent_adapter, khoj_adapter,
          )
          assert TOOL_SCHEMA['name'] == 'ramanujan_discover'
          print('All integration imports OK')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: pip install -e ".[dev]" ruff

      - name: Ruff check
        run: ruff check ramanujan_breakthrough_generator.py research_integration.py tests/ --select E,F,W
