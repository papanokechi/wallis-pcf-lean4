<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, minimum-scale=1, maximum-scale=1">
<title>Suika Game - Watermelon Fruit Merge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #FFD59D;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}
#game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 10px;
}
#header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 390px;
    margin-bottom: 6px;
}
#score-box {
    background: #F4A020;
    border: 3px solid #D4820E;
    border-radius: 12px;
    padding: 6px 18px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    min-width: 120px;
    text-align: center;
}
#score-box span { font-size: 24px; }
#next-box {
    background: #F4A020;
    border: 3px solid #D4820E;
    border-radius: 12px;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}
#next-fruit-preview {
    width: 40px;
    height: 40px;
}
#best-score-box {
    background: #E8941A;
    border: 3px solid #C4780A;
    border-radius: 12px;
    padding: 4px 14px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    text-align: center;
}
#game-container {
    position: relative;
    width: 390px;
    height: 620px;
    background: #FCEABB;
    border: 4px solid #D4820E;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    cursor: pointer;
    touch-action: none;
}
canvas#game-canvas {
    display: block;
    width: 100%;
    height: 100%;
}
#game-over-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    color: #fff;
}
#game-over-overlay h1 {
    font-size: 42px;
    margin-bottom: 10px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}
#game-over-overlay .final-score {
    font-size: 28px;
    margin-bottom: 30px;
    color: #FFD59D;
}
#game-over-overlay button {
    background: #F4A020;
    border: 3px solid #fff;
    border-radius: 30px;
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    padding: 14px 60px;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    transition: transform 0.1s;
}
#game-over-overlay button:hover { transform: scale(1.05); }
#game-over-overlay button:active { transform: scale(0.97); }
#evolution-chart {
    width: 390px;
    margin-top: 10px;
    background: #F4A020;
    border: 3px solid #D4820E;
    border-radius: 12px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    flex-wrap: wrap;
}
.evo-arrow {
    color: #fff;
    font-size: 10px;
    margin: 0 1px;
}
</style>
</head>
<body>

<div id="game-wrapper">
    <div id="header">
        <div id="score-box">SCORE<br><span id="score-display">0</span></div>
        <div id="best-score-box">BEST<br><span id="best-score-display">0</span></div>
        <div id="next-box">NEXT <canvas id="next-fruit-preview"></canvas></div>
    </div>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="game-over-overlay">
            <h1>GAME OVER</h1>
            <div class="final-score">Score: <span id="final-score">0</span></div>
            <button id="restart-btn">&#9654; PLAY AGAIN</button>
        </div>
    </div>
    <div id="evolution-chart"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script>
(function() {
"use strict";

/* ═══════════════════════════════════════════
   Fruit definitions — 11 Suika characters
   Cherry → Strawberry → Grape → Dekopon →
   Persimmon → Apple → Pear → Peach →
   Pineapple → Melon → Watermelon
   ═══════════════════════════════════════════ */
const FRUITS = [
    { name: "Cherry",     nameJP: "ちぇぽい", radius: 15, color: "#E8344E", dark: "#B5223A", light: "#FF7B8E", points: 1,  stemColor: "#5B8C2A" },
    { name: "Strawberry", nameJP: "いちぽい", radius: 21, color: "#FF6B81", dark: "#D94A5E", light: "#FFB0BC", points: 3,  seedColor: "#F5E050" },
    { name: "Grape",      nameJP: "ぶどぽい", radius: 27, color: "#8E44AD", dark: "#6C3483", light: "#BB8FCE", points: 6,  clusterColor: "#6C3483" },
    { name: "Dekopon",    nameJP: "おれんぽい", radius: 33, color: "#FF9800", dark: "#E67E00", light: "#FFB84D", points: 10, bumpColor: "#4CAF50" },
    { name: "Persimmon",  nameJP: "りんぽい", radius: 40, color: "#D2691E", dark: "#A0522D", light: "#E8A060", points: 15, leafColor: "#4CAF50" },
    { name: "Apple",      nameJP: "なしぽい", radius: 47, color: "#E74C3C", dark: "#C0392B", light: "#F08070", points: 21, leafColor: "#4CAF50" },
    { name: "Pear",       nameJP: "ぽんぽい", radius: 55, color: "#A8C256", dark: "#8BAA38", light: "#C8DC80", points: 28, stemColor: "#6B4226" },
    { name: "Peach",      nameJP: "ももぽい", radius: 63, color: "#FFB6C1", dark: "#E8919F", light: "#FFD9E0", points: 36, blushColor: "#FF8FA0" },
    { name: "Pineapple",  nameJP: "れもぽい", radius: 72, color: "#F9D423", dark: "#D4B030", light: "#FDE96B", points: 45, patternColor: "#D4A017" },
    { name: "Melon",      nameJP: "めろぽい", radius: 82, color: "#BCE27F", dark: "#8FBF50", light: "#D8F0A8", points: 55, netColor: "#8FBF50" },
    { name: "Watermelon", nameJP: "すいぽい", radius: 92, color: "#27AE60", dark: "#1E8449", light: "#58D68D", points: 66, stripeColor: "#196F3D" }
];

const DROPPABLE_MAX = 4;  // Indices 0–4 can be dropped

const W = 390;
const H = 620;
const WALL_THICK = 8;
const DROP_Y = 55;
const DANGER_Y = 85;
const PIXEL = window.devicePixelRatio || 1;

// ── Matter.js aliases ──
const { Engine, Runner, Bodies, Body, Composite, Events } = Matter;

let engine, runner;
let canvas, ctx;
let score = 0;
let bestScore = parseInt(localStorage.getItem('suika_best') || '0', 10);
let gameOver = false;
let currentIdx, nextIdx;
let dropX = W / 2;
let canDrop = true;
let fruitBodies = [];
let mergeQueue = [];       // Deferred merge pairs
let mergedIds = new Set();  // IDs already queued for merge this tick
let dangerTimer = null;
let dangerFlash = 0;
let inputListenersAdded = false;

// ── Particles system ──
let particles = [];

// ══════════════════════
//  INIT
// ══════════════════════
function init() {
    canvas = document.getElementById('game-canvas');
    canvas.width = W * PIXEL;
    canvas.height = H * PIXEL;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx = canvas.getContext('2d');
    ctx.setTransform(PIXEL, 0, 0, PIXEL, 0, 0);

    engine = Engine.create({
        gravity: { x: 0, y: 1.0 },
        positionIterations: 12,
        velocityIterations: 12,
        constraintIterations: 4
    });

    // Container walls — thick enough to prevent tunneling
    const wo = { isStatic: true, friction: 0.6, restitution: 0.05, label: 'wall' };
    Composite.add(engine.world, [
        Bodies.rectangle(W / 2, H + WALL_THICK / 2, W + WALL_THICK * 2, WALL_THICK, wo),     // floor
        Bodies.rectangle(-WALL_THICK / 2, H / 2, WALL_THICK, H * 2, wo),                       // left
        Bodies.rectangle(W + WALL_THICK / 2, H / 2, WALL_THICK, H * 2, wo)                     // right
    ]);

    score = 0;
    gameOver = false;
    fruitBodies = [];
    mergeQueue = [];
    mergedIds.clear();
    canDrop = true;
    dangerTimer = null;
    dangerFlash = 0;
    particles = [];

    currentIdx = randDrop();
    nextIdx = randDrop();

    updateScore();
    updateBest();
    drawNextPreview();
    buildEvoChart();
    document.getElementById('game-over-overlay').style.display = 'none';

    // Collision → queue merges (never mutate world inside callback)
    Events.on(engine, 'collisionStart', queueMerges);
    // Process queued merges safely after physics step
    Events.on(engine, 'afterUpdate', processMerges);
    // Clamp fruits inside bounds every step
    Events.on(engine, 'afterUpdate', clampBodies);

    runner = Runner.create({ delta: 1000 / 60 });
    Runner.run(runner, engine);

    if (!inputListenersAdded) { setupInput(); inputListenersAdded = true; }

    requestAnimationFrame(gameLoop);
}

function randDrop() { return Math.floor(Math.random() * (DROPPABLE_MAX + 1)); }

// ══════════════════════
//  DRAWING — FRUITS
// ══════════════════════
function lighten(hex, amt) {
    let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return '#' + [Math.min(255,r+amt), Math.min(255,g+amt), Math.min(255,b+amt)].map(c=>c.toString(16).padStart(2,'0')).join('');
}

function drawFruit(x, y, fruit, angle, alpha) {
    const r = fruit.radius;
    ctx.save();
    if (alpha !== undefined) ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.rotate(angle || 0);

    // Drop shadow
    ctx.beginPath();
    ctx.arc(1.5, 2, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fill();

    // Main body gradient
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.05, 0, 0, r);
    g.addColorStop(0, fruit.light);
    g.addColorStop(0.6, fruit.color);
    g.addColorStop(1, fruit.dark);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = fruit.dark;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // ── Fruit-specific decorations ──
    drawFruitDetail(fruit, r);

    // Specular highlight
    ctx.beginPath();
    ctx.arc(-r * 0.28, -r * 0.28, r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fill();

    // ── Kawaii face ──
    const eyeGap = r * 0.26;
    const eyeY = -r * 0.05;
    const eyeR = Math.max(r * 0.1, 2.2);

    // Eye whites
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-eyeGap, eyeY, eyeR * 1.35, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeGap, eyeY, eyeR * 1.35, 0, Math.PI * 2); ctx.fill();

    // Pupils
    ctx.fillStyle = '#2c2c2c';
    ctx.beginPath(); ctx.arc(-eyeGap, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeGap, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();

    // Eye shine
    ctx.fillStyle = '#fff';
    const shR = eyeR * 0.4;
    ctx.beginPath(); ctx.arc(-eyeGap - eyeR * 0.25, eyeY - eyeR * 0.3, shR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeGap - eyeR * 0.25, eyeY - eyeR * 0.3, shR, 0, Math.PI * 2); ctx.fill();

    // Cheek blush
    ctx.fillStyle = 'rgba(255,120,120,0.2)';
    ctx.beginPath(); ctx.ellipse(-eyeGap - r * 0.12, eyeY + r * 0.18, r * 0.12, r * 0.08, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(eyeGap + r * 0.12, eyeY + r * 0.18, r * 0.12, r * 0.08, 0, 0, Math.PI * 2); ctx.fill();

    // Smile
    ctx.beginPath();
    ctx.arc(0, r * 0.14, r * 0.16, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = Math.max(1.2, r * 0.055);
    ctx.lineCap = 'round';
    ctx.stroke();

    ctx.restore();
}

function drawFruitDetail(fruit, r) {
    switch (fruit.name) {
        case 'Cherry': {
            // Stem
            ctx.strokeStyle = fruit.stemColor || '#5B8C2A';
            ctx.lineWidth = Math.max(1.5, r * 0.1);
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(0, -r);
            ctx.quadraticCurveTo(r * 0.4, -r * 1.6, r * 0.1, -r * 1.3);
            ctx.stroke();
            break;
        }
        case 'Strawberry': {
            // Seeds
            ctx.fillStyle = fruit.seedColor || '#F5E050';
            for (let a = 0; a < 6; a++) {
                const ang = (a / 6) * Math.PI * 2 + 0.3;
                const sx = Math.cos(ang) * r * 0.5;
                const sy = Math.sin(ang) * r * 0.5 + r * 0.1;
                ctx.beginPath(); ctx.arc(sx, sy, r * 0.06, 0, Math.PI * 2); ctx.fill();
            }
            // Leaf/cap
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.ellipse(0, -r * 0.8, r * 0.5, r * 0.18, 0, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'Grape': {
            // Small bumps to suggest cluster
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            for (let a = 0; a < 5; a++) {
                const ang = (a / 5) * Math.PI * 2;
                const bx = Math.cos(ang) * r * 0.35;
                const by = Math.sin(ang) * r * 0.35;
                ctx.beginPath(); ctx.arc(bx, by, r * 0.35, 0, Math.PI * 2); ctx.fill();
            }
            // Stem
            ctx.strokeStyle = '#5B8C2A';
            ctx.lineWidth = Math.max(1, r * 0.08);
            ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(0, -r * 1.25); ctx.stroke();
            break;
        }
        case 'Dekopon': {
            // Top bump/leaf
            ctx.fillStyle = fruit.bumpColor || '#4CAF50';
            ctx.beginPath();
            ctx.ellipse(0, -r * 0.85, r * 0.25, r * 0.15, 0, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'Persimmon': {
            // Leaf on top
            ctx.fillStyle = fruit.leafColor || '#4CAF50';
            ctx.beginPath();
            ctx.moveTo(-r * 0.3, -r * 0.8);
            ctx.quadraticCurveTo(0, -r * 1.2, r * 0.3, -r * 0.8);
            ctx.quadraticCurveTo(0, -r * 0.7, -r * 0.3, -r * 0.8);
            ctx.fill();
            break;
        }
        case 'Apple': {
            // Stem
            ctx.strokeStyle = '#6B4226';
            ctx.lineWidth = Math.max(1.5, r * 0.06);
            ctx.beginPath(); ctx.moveTo(0, -r * 0.85); ctx.lineTo(r * 0.05, -r * 1.1); ctx.stroke();
            // Leaf
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.ellipse(r * 0.15, -r * 0.95, r * 0.2, r * 0.1, 0.3, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'Pear': {
            // Stem
            ctx.strokeStyle = fruit.stemColor || '#6B4226';
            ctx.lineWidth = Math.max(1.5, r * 0.06);
            ctx.beginPath(); ctx.moveTo(0, -r * 0.85); ctx.lineTo(0, -r * 1.1); ctx.stroke();
            break;
        }
        case 'Peach': {
            // Cleft line on top
            ctx.strokeStyle = 'rgba(200,100,120,0.3)';
            ctx.lineWidth = Math.max(1, r * 0.04);
            ctx.beginPath();
            ctx.moveTo(0, -r * 0.9);
            ctx.quadraticCurveTo(r * 0.05, -r * 0.3, 0, r * 0.6);
            ctx.stroke();
            // Leaf
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.ellipse(r * 0.2, -r * 0.85, r * 0.2, r * 0.1, 0.4, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'Pineapple': {
            // Cross-hatch pattern
            ctx.strokeStyle = fruit.patternColor || '#D4A017';
            ctx.lineWidth = Math.max(0.8, r * 0.025);
            for (let i = -3; i <= 3; i++) {
                const off = i * r * 0.25;
                ctx.beginPath(); ctx.moveTo(off - r, -r * 0.5); ctx.lineTo(off + r, r * 0.5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(off - r, r * 0.5); ctx.lineTo(off + r, -r * 0.5); ctx.stroke();
            }
            // Crown leaves
            ctx.fillStyle = '#4CAF50';
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath();
                ctx.ellipse(i * r * 0.15, -r * 0.95, r * 0.1, r * 0.3, i * 0.15, 0, Math.PI * 2);
                ctx.fill();
            }
            break;
        }
        case 'Melon': {
            // Net pattern
            ctx.strokeStyle = fruit.netColor || '#5FAF5F';
            ctx.lineWidth = Math.max(0.6, r * 0.015);
            ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.4;
            for (let a = 0; a < 6; a++) {
                const ang = (a / 6) * Math.PI;
                ctx.beginPath();
                ctx.moveTo(Math.cos(ang) * r * 0.9, Math.sin(ang) * r * 0.9);
                ctx.lineTo(-Math.cos(ang) * r * 0.9, -Math.sin(ang) * r * 0.9);
                ctx.stroke();
            }
            for (let ring = 0.3; ring <= 0.8; ring += 0.25) {
                ctx.beginPath(); ctx.arc(0, 0, r * ring, 0, Math.PI * 2); ctx.stroke();
            }
            ctx.globalAlpha = 1;
            break;
        }
        case 'Watermelon': {
            // Stripes
            ctx.strokeStyle = fruit.stripeColor || '#1B8C4A';
            ctx.lineWidth = Math.max(2, r * 0.05);
            ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.4;
            for (let s = 0; s < 8; s++) {
                const ang = (s / 8) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(ang) * r * 0.95, Math.sin(ang) * r * 0.95);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            break;
        }
    }
}

function drawFruitMini(cvs, idx, size) {
    cvs.width = size * PIXEL;
    cvs.height = size * PIXEL;
    cvs.style.width = size + 'px';
    cvs.style.height = size + 'px';
    const c = cvs.getContext('2d');
    c.setTransform(PIXEL, 0, 0, PIXEL, 0, 0);
    const f = FRUITS[idx];
    const r = size * 0.38;
    const cx = size / 2, cy = size / 2;

    c.beginPath(); c.arc(cx, cy, r, 0, Math.PI * 2);
    const g = c.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.05, cx, cy, r);
    g.addColorStop(0, f.light); g.addColorStop(0.6, f.color); g.addColorStop(1, f.dark);
    c.fillStyle = g; c.fill();
    c.strokeStyle = f.dark; c.lineWidth = 1; c.stroke();

    // Mini eyes
    const eg = r * 0.26, ey = cy - r * 0.05, er = Math.max(r * 0.12, 1.5);
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(cx - eg, ey, er * 1.2, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(cx + eg, ey, er * 1.2, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#2c2c2c';
    c.beginPath(); c.arc(cx - eg, ey, er, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(cx + eg, ey, er, 0, Math.PI * 2); c.fill();
}

// ══════════════════════
//  PARTICLES
// ══════════════════════
function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 1.5 + Math.random() * 4;
        particles.push({
            x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 2.5,
            r: 2 + Math.random() * 4, color, alpha: 1, life: 25 + Math.random() * 20
        });
    }
}

function tickParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.14;
        p.life--; p.alpha = Math.max(0, p.life / 45); p.r *= 0.97;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.save(); ctx.globalAlpha = p.alpha;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color; ctx.fill(); ctx.restore();
    }
}

// ══════════════════════
//  COLLISION QUEUING
// ══════════════════════
function queueMerges(event) {
    for (const pair of event.pairs) {
        const a = pair.bodyA, b = pair.bodyB;
        if (!a.fruitIndex !== undefined && b.fruitIndex !== undefined &&
            a.label && a.label.startsWith('fruit_') &&
            b.label && b.label.startsWith('fruit_')) {

            if (a.fruitIndex === b.fruitIndex && a.fruitIndex !== undefined) {
                if (!mergedIds.has(a.id) && !mergedIds.has(b.id) && !a._removed && !b._removed) {
                    mergedIds.add(a.id);
                    mergedIds.add(b.id);
                    mergeQueue.push({ a, b, idx: a.fruitIndex });
                }
            }
        }
    }
}

function processMerges() {
    if (mergeQueue.length === 0) return;

    const queue = mergeQueue.slice();
    mergeQueue.length = 0;

    for (const { a, b, idx } of queue) {
        // Safety: skip if already removed
        if (a._removed || b._removed) {
            mergedIds.delete(a.id);
            mergedIds.delete(b.id);
            continue;
        }

        const mx = (a.position.x + b.position.x) / 2;
        const my = (a.position.y + b.position.y) / 2;
        const fruit = FRUITS[idx];

        // Particles
        spawnParticles(mx, my, fruit.color, 8 + idx * 2);

        // Remove old bodies
        a._removed = true; b._removed = true;
        Composite.remove(engine.world, a);
        Composite.remove(engine.world, b);
        fruitBodies = fruitBodies.filter(f => f !== a && f !== b);
        mergedIds.delete(a.id);
        mergedIds.delete(b.id);

        // Score
        const newIdx = idx + 1;
        score += (newIdx < FRUITS.length) ? FRUITS[newIdx].points : 100;
        updateScore();

        // Spawn evolved fruit
        if (newIdx < FRUITS.length) {
            const nf = FRUITS[newIdx];
            // Clamp position so new fruit doesn't spawn inside walls
            const cx = Math.max(nf.radius + 2, Math.min(W - nf.radius - 2, mx));
            const cy = Math.max(DANGER_Y + nf.radius, Math.min(H - nf.radius - 2, my));

            const body = Bodies.circle(cx, cy, nf.radius, {
                restitution: 0.05, friction: 0.6, frictionAir: 0.03,
                density: 0.002 + newIdx * 0.0003,
                label: 'fruit_' + newIdx,
                slop: 0.01,
                collisionFilter: { group: 0, category: 0x0001, mask: 0xFFFF }
            });
            body.fruitIndex = newIdx;
            body.isNew = false;
            body._removed = false;
            body._dropTime = 0;

            Body.setVelocity(body, { x: 0, y: -0.3 });
            Composite.add(engine.world, body);
            fruitBodies.push(body);

            // Celebration for big merges
            if (newIdx >= 8) spawnParticles(mx, my, '#FFD700', 15);
            if (newIdx === 10) {
                spawnParticles(mx, my, '#2ECC71', 35);
                spawnParticles(mx, my, '#FFD700', 25);
                spawnParticles(mx, my, '#FF6B81', 20);
            }
        }
    }
}

// ══════════════════════
//  BOUNDS CLAMPING & DAMPING
// ══════════════════════
function clampBodies() {
    for (const body of fruitBodies) {
        if (body._removed) continue;
        const r = FRUITS[body.fruitIndex]?.radius || 10;
        const { x, y } = body.position;

        // Keep fruits inside the container (prevent tunneling through walls)
        const minX = r + 1, maxX = W - r - 1, maxY = H - r - 1;
        if (x < minX) {
            Body.setPosition(body, { x: minX, y });
            Body.setVelocity(body, { x: Math.abs(body.velocity.x) * 0.1, y: body.velocity.y });
        } else if (x > maxX) {
            Body.setPosition(body, { x: maxX, y });
            Body.setVelocity(body, { x: -Math.abs(body.velocity.x) * 0.1, y: body.velocity.y });
        }
        if (body.position.y > maxY) {
            Body.setPosition(body, { x: body.position.x, y: maxY });
            Body.setVelocity(body, { x: body.velocity.x, y: 0 });
        }

        // Damp very small residual movement so fruits settle and stop shaking
        const vel = body.velocity;
        const speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y);
        if (speed < 0.3 && speed > 0.01) {
            Body.setVelocity(body, { x: vel.x * 0.85, y: vel.y * 0.85 });
        }
        // Damp angular velocity to prevent endless spinning
        if (Math.abs(body.angularVelocity) < 0.02 && Math.abs(body.angularVelocity) > 0.001) {
            Body.setAngularVelocity(body, body.angularVelocity * 0.8);
        }
    }
}

// ══════════════════════
//  GAME LOOP
// ══════════════════════
function gameLoop() {
    if (!engine) return;

    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#FCEABB';
    ctx.fillRect(0, 0, W, H);

    // Floor & wall visuals
    ctx.fillStyle = '#D4820E';
    ctx.fillRect(0, 0, 3, H);       // left
    ctx.fillRect(W - 3, 0, 3, H);   // right
    ctx.fillRect(0, H - 3, W, 3);   // floor

    // Danger line (flashes red when near game over)
    dangerFlash = dangerTimer ? (dangerFlash + 0.08) : 0;
    const dangerAlpha = dangerTimer ? 0.3 + 0.3 * Math.abs(Math.sin(dangerFlash)) : 0.25;
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = `rgba(255, 50, 50, ${dangerAlpha})`;
    ctx.lineWidth = dangerTimer ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.moveTo(0, DANGER_Y); ctx.lineTo(W, DANGER_Y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw all fruit bodies
    for (const body of fruitBodies) {
        if (body._removed) continue;
        const f = FRUITS[body.fruitIndex];
        if (f) drawFruit(body.position.x, body.position.y, f, body.angle);
    }

    // Particles
    tickParticles();
    drawParticles();

    // Drop preview (ghost fruit + guide line)
    if (!gameOver && canDrop) {
        const f = FRUITS[currentIdx];
        const previewX = Math.max(f.radius + 4, Math.min(W - f.radius - 4, dropX));

        // Guide line
        ctx.beginPath();
        ctx.moveTo(previewX, DROP_Y + f.radius + 4);
        ctx.lineTo(previewX, H);
        ctx.strokeStyle = 'rgba(0,0,0,0.06)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);

        drawFruit(previewX, DROP_Y, f, 0, 0.45);
    }

    // Game over check
    if (!gameOver) checkDanger();

    requestAnimationFrame(gameLoop);
}

// ══════════════════════
//  DROP
// ══════════════════════
function dropFruit() {
    if (!canDrop || gameOver) return;
    canDrop = false;

    const f = FRUITS[currentIdx];
    const x = Math.max(f.radius + 4, Math.min(W - f.radius - 4, dropX));

    const body = Bodies.circle(x, DROP_Y, f.radius, {
        restitution: 0.05, friction: 0.6, frictionAir: 0.03,
        density: 0.002 + currentIdx * 0.0003,
        label: 'fruit_' + currentIdx,
        slop: 0.01,
        collisionFilter: { group: 0, category: 0x0001, mask: 0xFFFF }
    });
    body.fruitIndex = currentIdx;
    body.isNew = true;
    body._removed = false;
    body._dropTime = performance.now();

    Composite.add(engine.world, body);
    fruitBodies.push(body);

    // Mark eligible for game-over after settling time
    setTimeout(() => { body.isNew = false; }, 600);

    currentIdx = nextIdx;
    nextIdx = randDrop();
    drawNextPreview();

    // Drop cooldown (prevents spam-dropping)
    setTimeout(() => { canDrop = true; }, 400);
}

// ══════════════════════
//  GAME OVER DETECTION
// ══════════════════════
function checkDanger() {
    if (gameOver) return;

    let anyAbove = false;
    for (const body of fruitBodies) {
        if (body._removed || body.isNew) continue;
        const r = FRUITS[body.fruitIndex]?.radius || 0;
        const topEdge = body.position.y - r;
        // Must be above danger line AND mostly settled (low velocity)
        const vel = body.velocity;
        const speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y);
        if (topEdge < DANGER_Y && speed < 1.0) {
            anyAbove = true;
            break;
        }
    }

    if (anyAbove) {
        if (!dangerTimer) {
            dangerTimer = setTimeout(() => {
                // Re-verify after delay
                let still = false;
                for (const body of fruitBodies) {
                    if (body._removed || body.isNew) continue;
                    const r = FRUITS[body.fruitIndex]?.radius || 0;
                    const vel = body.velocity;
                    const speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y);
                    if (body.position.y - r < DANGER_Y && speed < 1.5) {
                        still = true;
                        break;
                    }
                }
                if (still && !gameOver) endGame();
                dangerTimer = null;
            }, 2000);
        }
    } else if (dangerTimer) {
        clearTimeout(dangerTimer);
        dangerTimer = null;
    }
}

function endGame() {
    gameOver = true;
    canDrop = false;

    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('suika_best', String(bestScore));
        updateBest();
    }

    document.getElementById('final-score').textContent = score;
    document.getElementById('game-over-overlay').style.display = 'flex';
}

// ══════════════════════
//  RESTART
// ══════════════════════
function restart() {
    if (runner) Runner.stop(runner);
    if (engine) {
        Events.off(engine, 'collisionStart', queueMerges);
        Events.off(engine, 'afterUpdate', processMerges);
        Events.off(engine, 'afterUpdate', clampBodies);
        Engine.clear(engine);
    }
    particles = [];
    mergeQueue = [];
    mergedIds.clear();
    init();
}

// ══════════════════════
//  INPUT
// ══════════════════════
function setupInput() {
    const el = document.getElementById('game-container');

    function getX(e) {
        const rect = el.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        return cx - rect.left;
    }

    el.addEventListener('mousemove', e => {
        if (!gameOver) dropX = Math.max(15, Math.min(W - 15, getX(e)));
    });
    el.addEventListener('touchmove', e => {
        e.preventDefault();
        if (!gameOver) dropX = Math.max(15, Math.min(W - 15, getX(e)));
    }, { passive: false });
    el.addEventListener('click', e => {
        if (gameOver) return;
        dropX = Math.max(15, Math.min(W - 15, getX(e)));
        dropFruit();
    });
    el.addEventListener('touchend', e => {
        if (gameOver) return;
        dropFruit();
    });
}

// ══════════════════════
//  UI
// ══════════════════════
function updateScore() { document.getElementById('score-display').textContent = score; }
function updateBest()  { document.getElementById('best-score-display').textContent = bestScore; }

function drawNextPreview() {
    drawFruitMini(document.getElementById('next-fruit-preview'), nextIdx, 40);
}

function buildEvoChart() {
    const div = document.getElementById('evolution-chart');
    div.innerHTML = '';
    for (let i = 0; i < FRUITS.length; i++) {
        const cvs = document.createElement('canvas');
        const sz = Math.max(18, Math.min(30, 16 + i * 1.3));
        drawFruitMini(cvs, i, sz);
        cvs.style.display = 'inline-block';
        cvs.title = FRUITS[i].name + ' (' + FRUITS[i].nameJP + ')';
        div.appendChild(cvs);
        if (i < FRUITS.length - 1) {
            const ar = document.createElement('span');
            ar.className = 'evo-arrow';
            ar.textContent = '→';
            div.appendChild(ar);
        }
    }
}

// ── Restart button ──
document.getElementById('restart-btn').addEventListener('click', restart);

// ── Go! ──
init();

})();
</script>
